# GtR -> atlas.projects ingestion + embedding pipeline.
# Secrets required: DATABASE_URL, OPENAI_API_KEY
# DATABASE_URL = Supabase SESSION pooler URI — use port 5432, NOT 6543
# Format: postgresql://postgres.afysgjiczzptubonbuxs:[PASSWORD]@aws-1-eu-west-1.pooler.supabase.com:5432/postgres

name: GtR Atlas Ingestion

on:
  schedule:
    # Weekly sync every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      skip_ingest:
        description: "Skip ingestion — corpus already complete (622 projects in DB)"
        required: false
        default: "true"
        type: boolean
      start_pass:
        description: "First pass to run (1-41). Ignored when skip_ingest is true."
        required: false
        default: "1"
        type: string
      active_only:
        description: "Filter to Active projects only (--active-only flag)"
        required: false
        default: "false"
        type: boolean

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: ${{ github.event_name == 'schedule' || github.event.inputs.skip_ingest != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements-atlas.txt

      - name: Run GtR ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          ACTIVE_FLAG=""
          # On scheduled runs, default to active-only to sync new active projects quickly
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ACTIVE_FLAG="--active-only"
          elif [ "${{ github.event.inputs.active_only }}" = "true" ]; then
            ACTIVE_FLAG="--active-only"
          fi
          python scripts/ingest_gtr.py --start-pass ${{ github.event.inputs.start_pass || '1' }} $ACTIVE_FLAG

  embed:
    needs: ingest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements-atlas.txt

      - name: Embed projects
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/embed_atlas.py

      - name: Embed lens categories
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/embed_lens_categories.py
