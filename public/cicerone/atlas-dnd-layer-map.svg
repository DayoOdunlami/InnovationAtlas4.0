<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img"
     aria-labelledby="title desc">
  <title id="title">Atlas / D&amp;D Layer Map</title>
  <desc id="desc">Six-layer Testbed Britain stack with Atlas's coverage highlighted.
    Atlas implements the data and matching layers. D&amp;D owns the institutional
    and political layers above. Layer 6  portability  is the boundary where
    the two efforts meet.</desc>

  <style>
    .panel-bg { fill: #fafafa; stroke: #d4d4d8; stroke-width: 1; rx: 8; ry: 8; }
    .layer { rx: 6; ry: 6; stroke: #52525b; stroke-width: 1.2; }
    .layer-text { font-family: system-ui, sans-serif; font-size: 14px; fill: #18181b; }
    .layer-sub  { font-family: system-ui, sans-serif; font-size: 11px; fill: #52525b; }
    .legend-text { font-family: system-ui, sans-serif; font-size: 12px; fill: #18181b; }
    .heading { font-family: system-ui, sans-serif; font-size: 18px; font-weight: 600; fill: #18181b; }
    .sub     { font-family: system-ui, sans-serif; font-size: 12px; fill: #52525b; }
    .atlas-fill { fill: var(--chart-2, hsl(212 95% 68%)); fill-opacity: 0.55; }
    .dnd-fill   { fill: var(--lens-3, hsl(271 81% 46%)); fill-opacity: 0.18; }
    .both-fill  { fill: var(--chart-3, hsl(216 92% 60%)); fill-opacity: 0.40; }
    .arrow      { stroke: #52525b; stroke-width: 1.2; fill: none; }
  </style>

  <rect class="panel-bg" x="20" y="20" width="860" height="520"/>
  <text class="heading" x="40" y="50">Atlas / D&amp;D Layer Map  Where the work meets</text>
  <text class="sub" x="40" y="70">Atlas (data + matching) Ć D&amp;D (institutional + political) Ć Layer 6 = handshake</text>

  <!-- Six layers, Layer 6 at top -->
  <g transform="translate(80, 100)">
    <!-- L6 -->
    <rect class="layer both-fill" x="0" y="0"   width="640" height="60"/>
    <text class="layer-text" x="14" y="24">Layer 6  Portability &amp; cross-sector evidence transfer</text>
    <text class="layer-sub"  x="14" y="46">D&amp;D defines the institutional contract. Atlas computes structured gaps (cosine + claim diff).</text>
    <!-- L5 -->
    <rect class="layer dnd-fill"  x="0" y="68"  width="640" height="50"/>
    <text class="layer-text" x="14" y="90">Layer 5  Trust framework &amp; governance</text>
    <text class="layer-sub"  x="14" y="108">D&amp;D-owned. Procurement weight, accreditation pathway, sector endorsement.</text>
    <!-- L4 -->
    <rect class="layer dnd-fill"  x="0" y="124" width="640" height="50"/>
    <text class="layer-text" x="14" y="146">Layer 4  Institutional federation contract</text>
    <text class="layer-sub"  x="14" y="164">D&amp;D-owned. Testbed Britain network shape, who joins, who pays, who underwrites.</text>
    <!-- L3 -->
    <rect class="layer atlas-fill" x="0" y="180" width="640" height="50"/>
    <text class="layer-text" x="14" y="202">Layer 3  Matching &amp; gap analysis</text>
    <text class="layer-sub"  x="14" y="220">Atlas-owned. Cosine similarity over claim embeddings; structured gap diffs.</text>
    <!-- L2 -->
    <rect class="layer atlas-fill" x="0" y="236" width="640" height="50"/>
    <text class="layer-text" x="14" y="258">Layer 2  Passport schema &amp; claim extraction</text>
    <text class="layer-sub"  x="14" y="276">Atlas-owned. evidence_profile / capability_profile / requirements_profile / certification_record.</text>
    <!-- L1 -->
    <rect class="layer atlas-fill" x="0" y="292" width="640" height="50"/>
    <text class="layer-text" x="14" y="314">Layer 1  Source ingestion (PDFs, trial reports, certifications)</text>
    <text class="layer-sub"  x="14" y="332">Atlas-owned. Embedding + chunking + provenance.</text>
    <!-- L0 -->
    <rect class="layer atlas-fill" x="0" y="348" width="640" height="40"/>
    <text class="layer-text" x="14" y="372">Layer 0  Production corpus (atlas.projects, atlas.live_calls, atlas.organisations)</text>
  </g>

  <!-- Legend -->
  <g transform="translate(740, 100)">
    <rect class="layer atlas-fill" x="0" y="0" width="20" height="20"/>
    <text class="legend-text" x="28" y="14">Atlas-owned</text>
    <rect class="layer dnd-fill"   x="0" y="28" width="20" height="20"/>
    <text class="legend-text" x="28" y="42">D&amp;D-owned</text>
    <rect class="layer both-fill"  x="0" y="56" width="20" height="20"/>
    <text class="legend-text" x="28" y="70">Layer 6  handshake</text>
  </g>

  <!-- Arrow showing handshake direction -->
  <g transform="translate(740, 200)">
    <text class="legend-text" x="0" y="0">Layer 6 is where</text>
    <text class="legend-text" x="0" y="16">Atlas's matching</text>
    <text class="legend-text" x="0" y="32">surfaces gaps</text>
    <text class="legend-text" x="0" y="48">that D&amp;D's</text>
    <text class="legend-text" x="0" y="64">framework</text>
    <text class="legend-text" x="0" y="80">interprets.</text>
  </g>
</svg>
