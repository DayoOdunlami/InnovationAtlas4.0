name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Database
      POSTGRES_URL: postgresql://testuser:testpass@localhost:5432/better_chatbot_test

      # Authentication
      BETTER_AUTH_SECRET: test-secret-key-for-ci-only-not-for-production-use
      BETTER_AUTH_URL: http://localhost:3000

      # Application
      NEXT_PUBLIC_BASE_URL: http://localhost:3000

      # LLM Provider (OpenRouter with free models)
      OPENROUTER_API_KEY: ${{ secrets.E2E_OPENROUTER_API_KEY || 'test-key' }}
      E2E_DEFAULT_MODEL: openRouter/gemini-2.0-flash-exp:free

      # Feature flags
      DISABLE_SIGN_UP: 0
      DISABLE_EMAIL_SIGN_IN: 0
      FILE_BASED_MCP_CONFIG: false

    services:
      # pgvector/pgvector:pg17 is the official pgvector image on top of
      # Postgres 17. Required because migration 0017 runs
      # `CREATE EXTENSION IF NOT EXISTS vector;` which fails on stock
      # `postgres:17` (pgvector is not bundled in the upstream image).
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: better_chatbot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10.2.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install chromium --with-deps

      - name: Setup test environment
        run: |
          # Create minimal .env for Playwright (only non-runtime vars if needed)
          touch .env

      # Migration 0017_atlas_briefs_phase1.sql declares a FK from
      # atlas.passport_share_tokens.passport_id -> atlas.passports(id), but
      # atlas.passports is provisioned out-of-band on our managed
      # environments (see the comment inside 0017) and is deliberately not
      # modelled in Drizzle. On a fresh CI Postgres container that table
      # does not exist, so the FK creation in 0017 fails. Create a minimal
      # stub here so the migration can complete. IF NOT EXISTS keeps this
      # safe to run anywhere — on environments where atlas.passports is
      # already populated out-of-band, this is a no-op.
      - name: Wait for Postgres to fully accept DDL
        env:
          PGPASSWORD: testpass
        run: |
          for i in $(seq 1 30); do
            if psql -h localhost -U testuser -d better_chatbot_test -c "select 1" >/dev/null 2>&1; then
              echo "Postgres is ready (attempt $i)"
              exit 0
            fi
            echo "Waiting for Postgres... (attempt $i)"
            sleep 2
          done
          echo "Postgres did not become ready in 60s"
          exit 1

      - name: Bootstrap out-of-band atlas.passports stub + pgvector for CI
        env:
          PGPASSWORD: testpass
        run: |
          psql -h localhost -U testuser -d better_chatbot_test -v ON_ERROR_STOP=1 <<'SQL'
          CREATE EXTENSION IF NOT EXISTS vector;
          CREATE SCHEMA IF NOT EXISTS atlas;
          CREATE TABLE IF NOT EXISTS atlas.passports (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid() NOT NULL
          );
          SQL

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Seed test users once before all tests
        run: pnpm test:e2e:seed

      - name: Build application
        run: pnpm build:local

      - name: Run E2E tests
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
